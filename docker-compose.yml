version: "3.9"

services:
  overv:
    image: overv/openstreetmap-tile-server:latest
    restart: always
    ports:
      - "${OSM_PORT:-8080}:80"
    volumes:
      - ./overv/data:/data
      - osm-data:/data/database/
    command: run
    env_file:
      - .env
    networks:
      - app-network

